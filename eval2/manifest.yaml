# =================== External anchor engines ===================
# Three CCRL 40/4 anchors that bracket the corpus. Run via the same
# docker_engine wrapper as the main engines. Their published Elo lets
# us cross-check that the SF UCI_Elo ladder is correctly calibrated
# on this hardware.
anchors:
  - name: rustic
    image: eval2/anchor-rustic:latest
    cmd: rustic
    ccrl_40_4_elo: 1820
    notes: Rustic Alpha 3+ (Marcel Vanthoor, MIT). Replaces TSCP 1.81 which is xboard-v1-only and incompatible with modern polyglot.

  - name: asymptote
    image: eval2/anchor-asymptote:latest
    cmd: asymptote
    ccrl_40_4_elo: 2150
    notes: Asymptote 0.7 (Maximilian Lupke). Mid-range anchor; native UCI, no internal strength limiter.

  - name: madchess32
    image: eval2/anchor-madchess32:latest
    cmd: dotnet /opt/madchess/MadChess.Engine.dll
    ccrl_40_4_elo: 2200
    notes: MIT-licensed .NET engine.

  - name: countergo40
    image: eval2/anchor-countergo40:latest
    cmd: /opt/countergo/counter
    ccrl_40_4_elo: 2400
    notes: Go-language engine, MIT.
