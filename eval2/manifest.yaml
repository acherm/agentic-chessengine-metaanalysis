  - name: chess-assembly-codex
    path: /Users/mathieuacher/SANDBOX/chess-assembly-codex
    tier: A
    corpus: main
    skipped: true
    skip_reason: "Repo ships src/core/core.s in Apple-clang assembly syntax (macOS-only). Linux clang/gcc cannot parse it. Evaluated via host-native fallback with the pre-built .dylib."
    build: make
    cmd: ./engine
    image: eval2/chess-assembly-codex:latest
    host_cmd: python3 scripts/uci_bridge.py --core build/libasm_core.dylib --depth 6
    host_cwd: /Users/mathieuacher/SANDBOX/chess-assembly-codex

