# Canonical engine manifest for eval2/
#
# One record per engine, real YAML. Fields:
#   name      : stable identifier (matches PGN engine name + result-card filename)
#   path      : absolute repo path on host (only used to build the docker image)
#   tier      : A | B | C — drives time-control selection (see ladder.json)
#   build     : host-side build command (kept here for reference; the canonical
#               build is whatever is in docker/engines/<name>/Dockerfile)
#   cmd       : UCI launch command *inside the container* (PID 1)
#   image     : docker image tag (built from docker/engines/<name>/Dockerfile)
#   notes     : free-form quirks
#
# Tier rationale (see ladder.json for time controls):
#   A : native-fast (compiled, expected sub-second per ply at 120+1)
#   B : interpreted-medium (Python/Java/OCaml/Ruby/COBOL/etc. at 120+1 with risk)
#   C : slow-by-design (LaTeX, SQL, Brainfuck — fixed movetime, reduced ladder)
#
# `corpus` filters scope:
#   main    : counted in the unified-Elo headline number
#   port    : Java→X port (special-role section)
#   dsl     : DSL design + transpile (special-role section)
#   failure : reported but not pooled

engines:

  # =================== Tier A : native-fast ===================
  - name: chess-purec
    path: /Users/mathieuacher/SANDBOX/chess-purec
    tier: A
    corpus: main
    build: make
    cmd: ./chess
    image: eval2/chess-purec:latest
    notes: ~2100 Elo. Bitboard engine.

  - name: chess-purec-codex
    path: /Users/mathieuacher/SANDBOX/chess-purec-codex
    tier: A
    corpus: main
    skipped: true
    skip_reason: "Engine binary SIGSEGVs at startup on Linux regardless of optimization level, architecture, or ulimits. Works only as macOS Mach-O. Evaluated via host-native fallback instead."
    build: make
    cmd: ./engine
    image: eval2/chess-purec-codex:latest
    host_cmd: ./build/purec_chess
    host_cwd: /Users/mathieuacher/SANDBOX/chess-purec-codex

  - name: chess-cplusplus-claude
    path: /Users/mathieuacher/SANDBOX/chess-cplusplus-claude
    tier: A
    corpus: main
    build: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j
    cmd: ./build/engine
    image: eval2/chess-cplusplus-claude:latest

  - name: cplusplus-chess
    path: /Users/mathieuacher/SANDBOX/cplusplus-chess
    tier: A
    corpus: main
    build: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j
    cmd: ./build/engine
    image: eval2/cplusplus-chess:latest

  - name: chess-rust-cc
    path: /Users/mathieuacher/SANDBOX/chess-rust-cc
    tier: A
    corpus: main
    build: cargo build --release
    cmd: ./target/release/chess-rust-cc
    image: eval2/chess-rust-cc:latest

  - name: chess-rust-codex
    path: /Users/mathieuacher/SANDBOX/chess-rust-codex
    tier: A
    corpus: main
    build: cargo build --release
    cmd: ./target/release/engine
    image: eval2/chess-rust-codex:latest
    notes: Uses Rust `chess` crate.

  - name: chess-rust-cc-redo
    path: /Users/mathieuacher/SANDBOX/chess-rust-cc-redo
    tier: A
    corpus: main
    build: cargo build --release
    cmd: ./target/release/chess_engine
    image: eval2/chess-rust-cc-redo:latest
    notes: CC Rust, from-scratch redo with zero external crates. Intended as a library-free counterpart to chess-rust-codex (which used the `chess` crate); guards against evasion concerns.

  - name: chess-why3-cc
    path: /Users/mathieuacher/SANDBOX/chess-why3-cc
    tier: B
    corpus: main
    build: dune build --release
    cmd: ./engine
    image: eval2/chess-why3-cc:latest
